# ┌──────────────────────────────────────────────────────────────────────┐
# │  Copepod — One-command Docker deployment                           │
# │  Run:  docker compose up --build                                   │
# └──────────────────────────────────────────────────────────────────────┘

services:
  # ── Backend (FastAPI + Cognee) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: copepod-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/copepod.db
      - FRONTEND_URL=http://localhost:3000
      - BACKEND_URL=http://localhost:8000
    volumes:
      - copepod-data:/app/data          # Persist SQLite + Cognee data
      - copepod-cognee:/app/.cognee     # Cognee KuzuDB + LanceDB storage
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - copepod-net

  # ── Studio (Next.js) ───────────────────────────────────────────────
  studio:
    build:
      context: ./studio
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    container_name: copepod-studio
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - copepod-net

  # ── MCP Server ─────────────────────────────────────────────────────
  # The MCP server is typically run locally (not in Docker) because
  # it needs filesystem access to read .copepod/config.json from the
  # user's project directory. This container is provided for users
  # who want to run it as a standalone service.
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: copepod-mcp
    ports:
      - "8080:8080"
    environment:
      - COPEPOD_CONFIG=/config/config.json
    volumes:
      - ./mcp-config:/config:ro         # Mount config from host
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - copepod-net
    profiles:
      - mcp                            # Only start with: docker compose --profile mcp up

volumes:
  copepod-data:
    driver: local
  copepod-cognee:
    driver: local

networks:
  copepod-net:
    driver: bridge
